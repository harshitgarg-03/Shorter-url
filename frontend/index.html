<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shorter URL</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Shorter<span>URL</span></h1>
      <p>Turn long, messy links into clean, shareable URLs.</p>
    </header>

    <main class="card">
      <form class="form">
        <div class="input-group">
          <input type="url" name="longUrl" placeholder="Enter your long URL here..." required>
          <button type="submit" class="btn">Shorten</button>
        </div>
        <div class="extras">
          <input type="text" name="customAlias" placeholder="Custom alias (optional)">
          <select name="expiry">
            <option value="">No expiry</option>
            <option value="1d">1 Day</option>
            <option value="7d">7 Days</option>
            <option value="30d">30 Days</option>
          </select>
        </div>
      </form>

      <section class="result">
        <h2>Your Shortened URL</h2>
        <div class="result-box">
          <input type="text" value="https://sho.rt/abc123" readonly>
          <button class="copy-btn">Copy</button>
        </div>
        <p class="original-url">Original: https://example.com/long/ugly/link</p>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> ShorterURL • Simple. Clean. Fast.</p>
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script src="main.js"></script>
</body>
</html>
